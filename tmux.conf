# ==============:===========
# 0. WIPE ALL DEFAULT BINDINGS
# ==========================
# This removes every default Prefix keybinding
unbind -n -a

# ==========================
# 1. General Settings & Prefix
# ==========================
# Set prefix to Ctrl+b
set -g prefix C-b
bind C-b send-prefix
# Enable mouse mode (lets you scroll history with the mouse wheel)
set -g mouse on
# WheelUpPane: If not in copy-mode, enter copy-mode and scroll up
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Restore mouse bindings lost due to `unbind -n -a`
bind -n MouseDown1Pane select-pane -t= \; send-keys -M
bind -n MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "if -Ft= '#{pane_in_mode}' 'copy-mode -M' 'send-keys -M'" "copy-mode -M"
bind -n C-MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "if -Ft= '#{pane_in_mode}' 'copy-mode -M' 'send-keys -M'" "copy-mode -M"
# bind -n M-MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "if -Ft= '#{pane_in_mode}' 'copy-mode -M' 'send-keys -M'" "copy-mode -M"

# In copy mode, dragging with Ctrl or Alt does a column highlight (rectangular selection)
bind -T copy-mode C-MouseDrag1Pane select-pane \; send-keys -X begin-selection \; send-keys -X rectangle-toggle
# bind -T copy-mode M-MouseDrag1Pane select-pane \; send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind -T copy-mode C-MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
# bind -T copy-mode M-MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

bind -T copy-mode-vi C-MouseDrag1Pane select-pane \; send-keys -X begin-selection \; send-keys -X rectangle-toggle
# bind -T copy-mode-vi M-MouseDrag1Pane select-pane \; send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind -T copy-mode-vi C-MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
# bind -T copy-mode-vi M-MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -n MouseDrag1Border resize-pane -M
bind -n MouseDown1Status select-window -t=
bind -n WheelDownStatus next-window
bind -n WheelUpStatus previous-window

# Enable double/triple click to select words/lines in normal mode
bind -n DoubleClick1Pane select-pane -t= \; copy-mode -M \; send-keys -X select-word
bind -n TripleClick1Pane select-pane -t= \; copy-mode -M \; send-keys -X select-line
# Fix escape delay (crucial if you use Vim/Neovim)
set -sg escape-time 10
# Increase scrollback buffer size
set -g history-limit 50000
# Enable extended key sequences (CSI u)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ==========================
# 2. Window Numbering
# ==========================
# Start windows at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
# Automatically renumber windows when one is closed
set -g renumber-windows on
# Default window name is empty; manual renames override this
setw -g automatic-rename on
setw -g automatic-rename-format ""

# ==========================
# 3. THE ESSENTIAL PREFIX COMMANDS
# ==========================
    # Prefix+w : open window/session tree
bind-key w choose-tree -w
    # Prefix+d : detach from session (leaves it running in background)
bind d detach-client
    # Prefix+: : open tmux command prompt
bind : command-prompt
    # Prefix+[ : enter copy/scroll mode
bind [ copy-mode

# ==========================
# 4. Window/Pane Navigation
# ==========================
    # Prefix+Left/Right : previous/next window
bind Left previous-window
bind Right next-window
    # Ctrl+M : move current window to another session via fzf picker
bind-key -n C-M run-shell 'sessions=$(tmux list-sessions -F "##{session_name}" | grep -vE "^.+-[0-9]{10}$" | grep -v "^#{session_name}$"); if [ -z "$sessions" ]; then tmux display-popup -x C -y C -w 30 -h 3 -s "bg=colour2,fg=colour0" -S "bg=colour2,fg=colour0" -E "tput civis; echo \"  no other sessions  \"; sleep 1.5"; else dst=$(echo "$sessions" | fzf-tmux -p 60%,40% -- --reverse --prompt="Move window to: "); [ -n "$dst" ] && tmux move-window -s "#{session_name}:#{window_index}" -t "$dst:"; fi'
    # Prefix+m : move current pane to another window in this session via fzf picker
bind-key m run-shell 'dst=$(tmux list-windows -t "#{session_name}" -F "##{window_index}: ##{window_name}" | grep -v "^#{window_index}:" | fzf-tmux -p 60%,40% -- --reverse --prompt="Move pane to: "); [ -n "$dst" ] && tmux move-pane -s "#{session_name}:#{window_index}.#{pane_index}" -t "#{session_name}:$(echo "$dst" | cut -d: -f1)"; true'

    # Ctrl+T : open a new window
bind-key -n C-T new-window
# bind-key -n M-t new-window
    # Ctrl+W : kill pane (with confirm dialog if a process is running)
bind-key -n C-W if-shell -F '#{?#{==:#{pane_current_command},bash},0,#{?#{==:#{pane_current_command},zsh},0,#{?#{==:#{pane_current_command},fish},0,#{?#{==:#{pane_current_command},sh},0,#{?#{==:#{pane_current_command},dash},0,1}}}}}' \
    "display-menu -s 'bg=red,fg=black' -S 'bg=red,fg=black' -H 'bg=red,fg=black' -T '#[align=centre,bg=red,fg=black] Confirm Kill ' -x \"#{e|-:#{e|+:#{pane_left},#{e|/:#{pane_width},2}},17}\" -y \"#{e|+:#{e|+:#{pane_top},#{e|/:#{pane_height},2}},4}\" 'Process \"#{pane_current_command}\" is running.' '' '' '' '' '' 'Kill pane' y 'run-shell \"~/dotfiles/tmux-kill-pane.sh #{pane_id} #{window_id}\"' 'Cancel' n ''" \
    "run-shell \"~/dotfiles/tmux-kill-pane.sh #{pane_id} #{window_id}\""
# bind-key -n M-w kill-pane \; select-layout -E \; refresh-client
    # Ctrl+H/L : previous/next window
bind-key -n C-H previous-window
bind-key -n C-L next-window
    # Ctrl+R : rename current window
bind-key -n C-R command-prompt -I "#W" "rename-window '%%'"

# Pane splits and layout
    # Alt+- : split vertically (new pane below); equalize heights among siblings
    # in that column only (matched by exact geometry, not tree depth)
bind-key -n M-- run-shell "~/dotfiles/tmux-split-pane.sh -v #{pane_id}"
    # Alt+\ or Alt+/ : split horizontally (new pane to the right); equalize widths
    # among siblings in that row only (matched by exact geometry, not tree depth)
bind-key -n M-\\ run-shell "~/dotfiles/tmux-split-pane.sh -h #{pane_id}"
bind-key -n M-/ run-shell "~/dotfiles/tmux-split-pane.sh -h #{pane_id}"
    # Alt+= : equalize all pane sizes
bind-key -n M-= select-layout -E
    # Alt+w : grow current pane to 2/3 of window width
bind-key -n M-w resize-pane -x 67%
    # Alt+a : shrink current pane to 1/3 of window width
bind-key -n M-a resize-pane -x 33%
    # Alt+z : resize current pane to 1/2 of window width
bind-key -n M-z resize-pane -x 50%
    # Prefix+s : toggle split direction between horizontal and vertical
bind-key s if-shell -F '#{==:#{@split_dir},h}' 'set-window-option @split_dir v ; select-layout even-vertical' 'set-window-option @split_dir h ; select-layout even-horizontal'

# Pane focus (no prefix)
    # Alt+h/j/k/l : move focus left/down/up/right (no-ops at edges)
bind-key -n M-h if-shell -F '#{pane_at_left}'   '' 'select-pane -L'
bind-key -n M-j if-shell -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -n M-k if-shell -F '#{pane_at_top}'    '' 'select-pane -U'
bind-key -n M-l if-shell -F '#{pane_at_right}'  '' 'select-pane -R'

# Pane broadcasting (prefix)
    # Prefix+b : toggle synchronized input to all panes in this window
bind-key b set-window-option synchronize-panes \; run-shell 'tmux display-popup -x C -y C -w 30 -h 3 -s "bg=colour2,fg=colour0" -S "bg=colour2,fg=colour0" -E "tput civis; echo \"  broadcast: #{?synchronize-panes,on,off}  \"; sleep 1.5"'

# Pane/window reordering (prefix)
    # Prefix+h/l : swap current pane with the one above/below
bind h swap-pane -U
bind l swap-pane -D
    # Prefix+H/L : shift current window left/right in the tab bar
bind H swap-window -t -1 \; select-window -t -1
bind L swap-window -t +1 \; select-window -t +1

# ==========================
# 5. Status Bar 
# ==========================

source-file ~/dotfiles/tmux-colors.conf

set -g status-position top
set -g status-right ""
set -g status-style "bg=#{@background}"
set -g status-left ""
set -g window-status-separator ""
set -g window-status-format "#[bg=#{@background},fg=#{@grey}]░▒▓#[bg=#{@grey},fg=#{@background}] #{?window_name,#W,#I} #[bg=#{@background},fg=#{@grey}]▓▒░"
set -g window-status-current-format "#[bg=#{@background},fg=#{?synchronize-panes,colour4,#{@pink}}]░▒▓#[bg=#{?synchronize-panes,colour4,#{@pink}},fg=#{@background}] #{?window_name,#W,#I} #[bg=#{@background},fg=#{?synchronize-panes,colour4,#{@pink}}]▓▒░"

# Pane border colors
set -g pane-border-style "fg=#{@grey},bg=#{@background}"
set -g pane-active-border-style "fg=#{@pink},bg=#{@background}"
set -g pane-border-lines single # single, double, heavy, simple, number

# Enable RGB true color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",xterm-256color:bce@"

# Dim unfocused panes
set -g window-style 'fg=#{?synchronize-panes,#{@white},#{@grey}},bg=#{?synchronize-panes,#{@background},#{@dim_background}}'
set -g window-active-style 'fg=#{@white},bg=#{@background}'

# ==========================
# 6. Easy Reloading
# ==========================
    # Prefix+r : reload tmux config
bind r run-shell '~/dotfiles/tmux-reload.sh'
    # Prefix+R : rename current (or parent grouped) session
bind R run-shell 'current="#{session_name}"; group="#{session_group}"; if [ -n "$group" ]; then parent=$(tmux list-sessions -F "##{session_name}" -f "##{==:##{session_group},$group}" | grep -v "^$current$" | head -1); fi; [ -z "$parent" ] && parent="$current"; tmux command-prompt -I "$parent" "rename-session -t \"$parent\" %%"'
