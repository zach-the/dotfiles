# ==========================
# 0. WIPE ALL DEFAULT BINDINGS
# ==========================
# This removes every default Prefix keybinding
unbind -n -a

# ==========================
# 1. General Settings & Prefix
# ==========================
# Set prefix to Ctrl+b
set -g prefix C-b
bind C-b send-prefix
# Enable mouse mode (lets you scroll history with the mouse wheel)
set -g mouse on
# WheelUpPane: If not in copy-mode, enter copy-mode and scroll up
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Restore mouse bindings lost due to `unbind -n -a`
bind -n MouseDown1Pane select-pane -t= \; send-keys -M
bind -n MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "if -Ft= '#{pane_in_mode}' 'copy-mode -M' 'send-keys -M'" "copy-mode -M"
bind -n MouseDrag1Border resize-pane -M
bind -n MouseDown1Status select-window -t=
bind -n WheelDownStatus next-window
bind -n WheelUpStatus previous-window

# Enable double/triple click to select words/lines in normal mode
bind -n DoubleClick1Pane select-pane -t= \; copy-mode -M \; send-keys -X select-word
bind -n TripleClick1Pane select-pane -t= \; copy-mode -M \; send-keys -X select-line
# Fix escape delay (crucial if you use Vim/Neovim)
set -sg escape-time 10
# Increase scrollback buffer size
set -g history-limit 50000
# Enable extended key sequences (CSI u)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ==========================
# 2. Window Numbering
# ==========================
# Start windows at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
# Automatically renumber windows when one is closed
set -g renumber-windows on
# Default window name is empty; manual renames override this
setw -g automatic-rename on
setw -g automatic-rename-format ""

# ==========================
# 3. THE ESSENTIAL PREFIX COMMANDS
# ==========================
# bind w choose-tree
bind-key w choose-tree -w
# Prefix + d : Detach from the tmux session (to leave it running in background)
bind d detach-client
# Prefix + : : Open the tmux command prompt
bind : command-prompt
# Prefix + [ : Enter copy/scroll mode using the keyboard
bind [ copy-mode

# ==========================
# 4. Window/Pane Navigation
# ==========================
# Prefix + h or Left Arrow to go to the previous window
bind Left previous-window
# Prefix + l or Right Arrow to go to the next window
bind Right next-window
# Prefix + M : Move current window to another session via fzf
bind-key -n C-M run-shell 'src="#{session_name}:#{window_index}"; dst=$(tmux list-sessions -F "##{session_name}" | grep -vE "^.+-[0-9]{10}$" | grep -v "^#{session_name}$" | fzf-tmux -p 60%,40% -- --reverse --prompt="Move window to: "); [ -n "$dst" ] && tmux move-window -s "$src" -t "$dst:"; true'

bind-key -n C-T new-window
bind-key -n C-W kill-pane \; select-layout -E
bind-key -n C-H previous-window
bind-key -n C-L next-window
bind-key -n C-R command-prompt -I "#W" "rename-window '%%'"

# Pane navigation (no prefix)
bind-key -n M-= select-layout -E
bind-key -n M-- split-window -v -c "#{pane_current_path}" \; select-layout -E
bind-key -n M-\\ split-window -h -c "#{pane_current_path}" \; select-layout -E
bind-key -n M-h if-shell -F '#{pane_at_left}'   '' 'select-pane -L'
bind-key -n M-j if-shell -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -n M-k if-shell -F '#{pane_at_top}'    '' 'select-pane -U'
bind-key -n M-l if-shell -F '#{pane_at_right}'  '' 'select-pane -R'
bind h swap-pane -U
bind l swap-pane -D

# ==========================
# 5. Status Bar (matches WezTerm tab style)
# ==========================
set -g status-position top
set -g status-right ""
set -g status-style default
set -g status-left ""
set -g status-fg '#787c99'
set -g window-status-separator " "
set -g window-status-format "#[bg=default,fg=default]░▒▓#[bg=#787c99,fg=black] #{?window_name,#W,#I} #[bg=default,fg=default]▓▒░"
set -g window-status-current-format "#[bg=#0d0d17,fg=#ff007f]░▒▓#[bg=#ff007f,fg=#0d0d17] #{?window_name,#W,#I} #[bg=#0d0d17,fg=#ff007f]▓▒░"

# Pane border colors
set -g pane-active-border-style "fg=#ff007f"

# Dim unfocused panes
set -g window-style 'bg=default,fg=default'
set -g window-active-style 'bg=default,fg=default'

# ==========================
# 6. Easy Reloading
# ==========================
# Prefix + r : Reload config on the fly
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind R run-shell 'current="#{session_name}"; group="#{session_group}"; if [ -n "$group" ]; then parent=$(tmux list-sessions -F "##{session_name}" -f "##{==:##{session_group},$group}" | grep -v "^$current$" | head -1); fi; [ -z "$parent" ] && parent="$current"; tmux command-prompt -I "$parent" "rename-session -t \"$parent\" %%"'
