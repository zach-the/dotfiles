# =====================================================================
# HYPER (Ctrl+Alt+Shift+Super) KEYBIND MAP  —  [X] = bound   [ ] = free
# =====================================================================
# One merged keymap, identical in WIDE-TILE and FLOAT (see hyper+Space
# below — it now only switches tiling algorithm / auto-float-new-window
# behavior, not keybinds). The window-snap keys (halves/thirds/quarters/
# maximize/center/resize) are floating-window actions mirroring
# hammerspoon-init.lua; on a tiled window in WIDE-TILE mode they may
# only partially apply (e.g. resize can nudge the tiling split while
# the move half of the same action is ignored) rather than snapping
# cleanly, since Hyprland's move/resize dispatchers are floating-first.
#
#  [ ][ ][ ][ ][ ][ ][ ][ ][ ][0][-][=]
#    [Q][W][E][R][T][Y][U][I][O][P]
#      [A][S][D][F][G][H][J][K][L]
#         [Z][X][C][V][B][N][M]
#
#                                       [ RETURN ]
#
#   Q          → kill active window
#   W E        → two-thirds(1) / two-thirds(2)
#   R          → app launcher (rofi)
#   T          → launch terminal
#   Y / O      → move window to prev / next display
#   U I        → top-left / top-right quarter
#   P          → toggle floating for the whole workspace
#   A S D      → thirds(1) / thirds(2) / thirds(3) window snap
#   F          → maximize
#   G          → center window
#   H / L      → prev / next workspace
#   J K        → bottom-left / bottom-right quarter
#   Z X C      → half-split (context-aware: portrait vs. landscape)
#   V          → paste clipboard as keystrokes
#   B          → send window to back of stack, focus new top window
#   N / M      → browser (personal profile) / browser (work profile)
#   BACKSPACE  → lock screen
#   RETURN     → fullscreen
#   SPACE      → toggle WIDE-TILE ↔ FLOAT (layout/auto-float only now)
#   0          → work VNC login script
#   - =        → resize smaller / larger
#   left/right-drag anywhere on window → move / resize
#
#   FREE: 1 2 3 4 5 6 7 8 9
#   UNASSIGNED: per-window floating toggle (was F) has no key right now
# =====================================================================

# EXEC ONCE
# Ensure session variables are exported to dbus and systemd
env = XDG_CURRENT_DESKTOP,Hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP SSH_AUTH_SOCK
exec-once = systemctl --user start xdg-desktop-portal xdg-desktop-portal-gtk
# idk what this one does
exec-once = systemctl --user start hyprpolkitagent
# behavioral/preferential stuff
exec-once = hyprlock
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = ~/.config/hypr/monitor_init.sh
exec-once = ~/.config/hypr/raise_on_focus.sh

# MONITORS - managed by nwg-displays (SUPER+I), saved to monitors.conf
source = ~/.config/hypr/monitors.conf
monitor = , preferred, auto, 1

# WORKSPACE RULES - eDP-1 is pinned statically; all other monitors are
# handled dynamically by monitor_init.sh at runtime
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

# APPS AND THEIR KEYBINDS
$terminal = wezterm
$browser = google-chrome-stable --password-store=basic
$fileManager = nautilus -w
$menu = rofi -show combi
$music = spotify-launcher

$hyper = CONTROL_ALT_SHIFT_SUPER

$winmove = ~/.config/hypr/winmove.sh

bind = $hyper, T, exec, $terminal
bind = $hyper, N, exec, $browser --profile-directory="Default" # personal
bind = $hyper, M, exec, $browser --profile-directory="Profile 3" # work
bind = $hyper, R, exec, $menu
bind = $hyper, Backspace, exec, hyprlock
bind = $hyper, Return, fullscreen, 0
bind = $hyper, Q, killactive
bind = $hyper, B, exec, ~/.config/hypr/send_to_back.sh
bind = $hyper, V, exec, bash -c 'sleep 0.3 && wl-paste --no-newline | xdotool type --clearmodifiers --delay 1 --file -'
bind = $hyper, P, exec, ~/.config/hypr/toggle_workspace_float.sh
bind = $hyper, 0, exec, ~/.work_tigervnc_login.sh

# Move window to next/prev display (verify `mon:` dispatcher syntax
# against your installed Hyprland version if this doesn't work)
bind = $hyper, O, exec, hyprctl dispatch movewindow mon:+1
bind = $hyper, Y, exec, hyprctl dispatch movewindow mon:-1

# Window-snap binds mirroring hammerspoon-init.lua (see the keymap
# comment at the top of this file for the full picture)
bind = $hyper, Z, exec, $winmove half 1      # top half / left half
bind = $hyper, X, exec, $winmove halfcenter  # center half
bind = $hyper, C, exec, $winmove half 2      # bottom half / right half
bind = $hyper, U, exec, $winmove 0 0 0.5 0.5      # top left
bind = $hyper, I, exec, $winmove 0.5 0 0.5 0.5    # top right
bind = $hyper, J, exec, $winmove 0 0.5 0.5 0.5    # bottom left
bind = $hyper, K, exec, $winmove 0.5 0.5 0.5 0.5  # bottom right
bind = $hyper, A, exec, $winmove third 1
bind = $hyper, S, exec, $winmove third 2
bind = $hyper, D, exec, $winmove third 3
bind = $hyper, W, exec, $winmove twothirds 1
bind = $hyper, E, exec, $winmove twothirds 2
bind = $hyper, F, exec, $winmove 0 0 1 1          # maximize
bind = $hyper, G, centerwindow
bind = $hyper, minus, resizeactive, -20 -20
bind = $hyper, equal, resizeactive, 20 20

# File manager / display manager
bind = SUPER, O, exec, $fileManager
bind = SUPER, I, exec, nwg-displays

# Quick-access utility popups — always float, see windowrules below
bind = SUPER, U, exec, pavucontrol
bind = SUPER, Y, exec, blueman-manager

# Special workspace (scratchpad)
bind = SUPER, P, togglespecialworkspace
bind = SUPER SHIFT, P, exec, ~/.config/hypr/special_toggle.sh

# WIDE-TILE / FLOAT toggle — now only switches tiling algorithm and
# whether new windows spawn floating (mode_toggle.sh); keybinds are
# identical in both modes, so it no longer touches any submap
bind = $hyper, Space, exec, ~/.config/hypr/mode_toggle.sh
source = ~/.config/hypr/mode_float_rule.conf
source = ~/.config/hypr/mode_layout.conf

# LANGUAGE
env = LANG,en_US.UTF-8
env = LC_ALL,en_US.UTF-8

# WORKSPACE / FOCUS KEYBINDS
$ws_script = ~/.config/hypr/ws_nav.sh
# Move focus with win + arrow keys
# (raise_on_focus.sh handles bringing the newly-focused window to top,
# for this and every other kind of focus change including mouse hover)
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d
# Screenshots — clipboard-only, and clipboard+save-to-file
bind = SUPER, Z, exec, hyprshot --mode region --clipboard-only
bind = SUPER SHIFT, Z, exec, hyprshot --mode region -o ~/Screenshots
bind = , Print, exec, hyprshot --mode region --clipboard-only
# resize
bindm = $hyper, mouse:272, movewindow
bindm = $hyper, mouse:273, resizewindow
# special workspace (scratchpad) — see SUPER,P / SUPER+SHIFT,P above
# move window to new workspace
bind = SUPER SHIFT, L, exec, $ws_script next move
bind = SUPER SHIFT, H, exec, $ws_script prev move
# workspace switching
bind = $hyper, L, exec, $ws_script next
bind = $hyper, H, exec, $ws_script prev

# LOOK AND FEEL
source = ~/.config/hypr/colors.conf

general {
  gaps_in = 5
  gaps_out = 10
  col.active_border = $active_border_start $active_border_end 45deg
  col.inactive_border = $inactive_border
  border_size = 1
  resize_on_border = true
  allow_tearing = false
}

decoration {
  rounding = 10
  rounding_power = 2
  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = $shadow_color
  }
}

# animations {
#     enabled = yes, please :)
#     #        NAME,           X0,   Y0,   X1,   Y1
#     bezier = easeOutQuint,   0.23, 1,    0.32, 1
#     bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
#     bezier = linear,         0,    0,    1,    1
#     bezier = almostLinear,   0.5,  0.5,  0.75, 1
#     bezier = quick,          0.15, 0,    0.1,  1
#     #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
#     animation = global,        1,     10,    default
#     animation = border,        1,     5.39,  easeOutQuint
#     animation = windows,       1,     4.79,  easeOutQuint
#     animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
#     animation = windowsOut,    1,     1.49,  linear,       popin 87%
#     animation = fadeIn,        1,     1.73,  almostLinear
#     animation = fadeOut,       1,     1.46,  almostLinear
#     animation = fade,          1,     3.03,  quick
#     animation = layers,        1,     3.81,  easeOutQuint
#     animation = layersIn,      1,     4,     easeOutQuint, fade
#     animation = layersOut,     1,     1.5,   linear,       fade
#     animation = fadeLayersIn,  1,     1.79,  almostLinear
#     animation = fadeLayersOut, 1,     1.39,  almostLinear
#     animation = workspaces,    1,     1.94,  almostLinear, slide
#     animation = workspacesIn,  1,     1.21,  almostLinear, slide
#     animation = workspacesOut, 1,     1.94,  almostLinear, slide
#     animation = zoomFactor,    1,     7,     quick
# }

animations {
    enabled = yes

    #        NAME,        X0,    Y0,   X1,    Y1
    # Expo ease-out: launches fast, glides smoothly to rest — macOS workspace/window feel
    bezier = macEaseOut, 0.16,  1,    0.3,   1
    # Spring: slight overshoot then settles — macOS window-open pop
    bezier = macSpring,  0.155, 1.6,  0.165, 1
    # Standard: gentle ease for fades and borders
    bezier = macDefault, 0.25,  0.1,  0.25,  1

    #           NAME,          ONOFF, SPEED, CURVE,      [STYLE]
    # Windows — pop in with a spring, fade out quickly
    animation = windowsIn,     1,     3.5,   macSpring,  popin 80%
    animation = windowsOut,    1,     2,     macDefault, popin 80%
    animation = windowsMove,   1,     3.5,   macEaseOut

    # Workspaces — smooth horizontal slide matching macOS paging
    animation = workspacesIn,  1,     3.5,   macEaseOut, slide
    animation = workspacesOut, 1,     3.5,   macEaseOut, slide

    # Special workspace — slides in/out from the bottom
    animation = specialWorkspace, 1, 3.5, macEaseOut, slidevert

    # Fades
    animation = fadeIn,        1,     2.5,   macDefault
    animation = fadeOut,       1,     2,     macDefault
    animation = fade,          1,     2.5,   macDefault
    animation = fadeSwitch,    1,     2,     macDefault
    animation = fadeShadow,    1,     2.5,   macDefault
    animation = fadeDim,       1,     2.5,   macDefault

    # Layers (waybar, rofi, etc.)
    animation = layersIn,      1,     3,     macEaseOut, fade
    animation = layersOut,     1,     2,     macDefault, fade
    animation = fadeLayersIn,  1,     2.5,   macDefault
    animation = fadeLayersOut, 1,     2,     macDefault

    # Border color transitions
    animation = border,        1,     4,     macEaseOut
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# CURSOR/INPUT
cursor {
    no_hardware_cursors = false
}
input {
  kb_layout = us,ge
  # kb_options = grp:win_space_toggle # disabled for now
  follow_mouse = 1
  sensitivity = 0 # -1.0 to 1.0; 0 is default
  touchpad {
    natural_scroll = true
    tap-to-click = true
    clickfinger_behavior = true
    scroll_factor = 0.2
  }
}
gesture = 3, horizontal, workspace
#gesture = 3, left, dispatcher, exec, ~/.config/hypr/ws_nav.sh next
#gesture = 3, right, dispatcher, exec, ~/.config/hypr/ws_nav.sh prev

# DARK THEME
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"   # for GTK3 apps
env = QT_QPA_PLATFORMTHEME,qt5ct
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, bash -c 'wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.5; ~/.config/hypr/volume_refresh.sh'
bindel = ,XF86AudioLowerVolume, exec, bash -c 'wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-; ~/.config/hypr/volume_refresh.sh'
bindel = ,XF86AudioMute, exec, bash -c 'wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; ~/.config/hypr/volume_refresh.sh'
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

xwayland {
    force_zero_scaling = true
}

# plugin = /home/zach/.config/hypr/plugins/ultrawide-dwindle.so
plugin = /home/zach/.config/hypr/plugins/ultrawide-dwindle-improved.so

# Lid Behavior
# Lid close: if an external display is connected, disable the internal panel
# and stay awake; otherwise lock, blank, and suspend. See lid.sh.
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/lid.sh close
# Lid open: re-enable internal panel / turn display on
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/lid.sh open

# stuff for cad?
# Unified syntax: match:[type] [regex], [property] [value]
windowrule = match:class ^FreeCAD$, float 1
windowrule = match:title ^Report view.*$, float 1
windowrule = match:class ^OrcaSlicer$, float 1
windowrule = match:class ^openscad$, float 1
# Keep OrcaSlicer usable on Hyprland
windowrule = match:class ^OrcaSlicer$, float 1
windowrule = match:class ^OrcaSlicer$, size 1200 800
windowrule = match:class ^OrcaSlicer$, center 1

# Utility popups (SUPER+U / SUPER+Y) — always float regardless of mode
windowrule = match:class ^org\.pulseaudio\.pavucontrol$, float 1
windowrule = match:class ^org\.pulseaudio\.pavucontrol$, size 800 600
windowrule = match:class ^org\.pulseaudio\.pavucontrol$, center 1
windowrule = match:class ^blueman-manager$, float 1
windowrule = match:class ^blueman-manager$, size 700 500
windowrule = match:class ^blueman-manager$, center 1

# nwg-displays (SUPER+I) — always float regardless of mode. Unlike
# pavucontrol/blueman-manager, it doesn't set size hints Hyprland auto-
# floats on, so it needs an explicit rule.
windowrule = match:class ^nwg-displays$, float 1
windowrule = match:class ^nwg-displays$, center 1

# Audio output menu (waybar volume-module click) — always float
# regardless of mode. No size/center rule: audio_menu_launch.sh sizes
# it via wezterm's initial_cols/rows and positions it itself, right
# under wherever the click happened.
windowrule = match:class ^audio-menu$, float 1

# Wi-Fi menu (waybar network-module click) — same deal as audio-menu.
windowrule = match:class ^wifi-menu$, float 1

# Bluetooth menu (waybar custom/bluetooth-module click) — same deal.
windowrule = match:class ^bluetooth-menu$, float 1
