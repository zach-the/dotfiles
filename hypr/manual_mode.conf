# =====================================================================
# MANUAL MODE — floating-window submap mirroring the mac keybinds from
# hammerspoon-init.lua. Entered/exited with $hyper+Space (see
# hyprland.conf). Built from hypr/manual-mode-worksheet.txt.
#
# Hyprland submaps fully replace the active bind set — nothing outside
# `submap = manual` fires while it's active, so every bind needed while
# in manual mode (even ones identical to normal mode) is re-declared
# below.
# =====================================================================

$winmove = ~/.config/hypr/winmove.sh

submap = manual

# ---- BOTH MODES (same behavior as normal mode) -----------------------
bind = $hyper, R, exec, $menu
bind = $hyper, Backspace, exec, hyprlock
bind = $hyper, T, exec, $terminal
bind = $hyper, N, exec, $browser --profile-directory="Default"
bind = $hyper, M, exec, $browser --profile-directory="Profile 3"
bind = $hyper, Q, killactive
bind = $hyper, Z, exec, hyprshot --mode region --clipboard-only
bind = $hyper, Return, fullscreen, 0
bind = $hyper, H, exec, ~/.config/hypr/ws_nav.sh prev
bind = $hyper, L, exec, ~/.config/hypr/ws_nav.sh next
bind = $hyper, O, exec, hyprctl dispatch movewindow mon:+1
bind = $hyper, Y, exec, hyprctl dispatch movewindow mon:-1
bind = SUPER, P, togglespecialworkspace
bind = SUPER SHIFT, P, exec, ~/.config/hypr/special_toggle.sh
bind = SUPER, I, exec, nwg-displays
bind = SUPER, O, exec, $fileManager
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d
bind = SUPER SHIFT, L, exec, ~/.config/hypr/ws_nav.sh next move
bind = SUPER SHIFT, H, exec, ~/.config/hypr/ws_nav.sh prev move
bindm = $hyper, mouse:272, movewindow
bindm = $hyper, mouse:273, resizewindow

# Exit manual mode the same way you entered it — mode_toggle.sh
# drives the submap switch itself, see hyprland.conf
bind = $hyper, Space, exec, ~/.config/hypr/mode_toggle.sh

# ---- MANUAL MODE ONLY (mac window-management binds) -------------------
# Halves
bind = $hyper, A, exec, $winmove 0 0 0.5 1        # left half
bind = $hyper, D, exec, $winmove 0.5 0 0.5 1      # right half
bind = $hyper, S, exec, $winmove 0.25 0 0.5 1     # center half
bind = $hyper, G, exec, $winmove 0 0 1 0.5        # top half
bind = $hyper, B, exec, $winmove 0 0.5 1 0.5      # bottom half

# Corners
bind = $hyper, U, exec, $winmove 0 0 0.5 0.5      # top left
bind = $hyper, I, exec, $winmove 0.5 0 0.5 0.5    # top right
bind = $hyper, J, exec, $winmove 0 0.5 0.5 0.5    # bottom left
bind = $hyper, K, exec, $winmove 0.5 0.5 0.5 0.5  # bottom right

# Thirds / two-thirds (aspect-aware: horizontal on portrait monitors,
# vertical on landscape, matching hammerspoon's third()/twoThirds())
bind = $hyper, 1, exec, $winmove third 1
bind = $hyper, 2, exec, $winmove third 2
bind = $hyper, 3, exec, $winmove third 3
bind = $hyper, W, exec, $winmove twothirds 1
bind = $hyper, E, exec, $winmove twothirds 2

# Sizing
bind = $hyper, F, exec, $winmove 0 0 1 1          # maximize
bind = $hyper, C, centerwindow
bind = $hyper, minus, resizeactive, -20 -20
bind = $hyper, equal, resizeactive, 20 20

submap = reset
