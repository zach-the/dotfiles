cat hyprlock.conf 
general {
    disable_loading_bar = false
    hide_cursor = true
}

background {
    monitor =
    path = screenshot   # blurs your current screen; or use a file path
    blur_passes = 2
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(255, 255, 255)
    placeholder_text = <i>Password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 64
    font_family = sans
    position = 0, 80
    halign = center
    valign = center
}
