# Cyberpunk Neon — Light variant
# Near-white lavender backgrounds. Same accent hues as dark.toml, darkened for legibility.
# Edit here, then run: python3 generate_colors.py light

[palette]
# --- Backgrounds ---
# Note: bg also doubles as the ANSI "black" terminal slot (color0).
bg          = "#f5f4fc"   # near-white lavender (base — tab edges)
# bg_dim      = "#e8e7f5"   # slightly dimmer (tmux inactive pane)
bg_dim      = "#dbd9f4"   # slightly dimmer (tmux inactive pane)
bg_inactive = "#dddcee"   # inactive tab background
bg_normal   = "#eeedf8"   # normal terminal/window background
bg_cursorline = "#d0cfdf" # cursorline + statusline

# --- Text ---
fg    = "#1a1a2e"   # deep navy (primary text)
grey  = "#5a5c7a"   # muted purple-grey (inactive / secondary text)
white = "#2e3050"   # dark indigo (terminal white slot)

# --- Accents (same hues as dark.toml, darkened for a light surface) ---
pink   = "#cc0066"   # darkened neon pink
blue   = "#0099cc"   # darkened neon blue
green  = "#007744"   # darkened neon green
yellow = "#997700"   # darkened amber
purple = "#6600bb"   # darkened violet
orange = "#cc4400"   # darkened orange

# --- Brights (ANSI 8–15) ---
black_bright  = "#6b6e8f"
pink_bright   = "#dd0077"
green_bright  = "#008855"
yellow_bright = "#aa8800"
blue_bright   = "#00aadd"
purple_bright = "#7700cc"
orange_bright = "#dd5500"
white_bright  = "#9698b0"

# --- Misc ---
battery_warning = "#cc6600"
shadow          = "#c0c0d0"   # soft light shadow
border_inactive = "#c8c8dc"   # light purple-grey border

# --- Rofi ---
rofi_bg     = "#f5f5f7"
rofi_bg_alt = "#e5e5ea"
rofi_fg_dim = "#8e8e93"
rofi_fg_sec = "#6c6c70"
