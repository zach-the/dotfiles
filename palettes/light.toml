# Cyberpunk Neon — Light variant
# Mid-tone lavender-grey backgrounds, not blinding white. Same accent hues as
# dark.toml, darkened to stay legible on the lighter surface.
# Edit here, then run: python3 generate_colors.py light

[palette]
# --- Backgrounds (medium lavender-grey — not white, not dark) ---
# Note: bg also doubles as the ANSI "black" terminal slot (color0).
bg          = "#d0cee8"   # medium lavender (base — tab edges)
bg_dim      = "#c4c2dc"   # slightly dimmer (tmux inactive pane)
bg_inactive = "#b8b6d0"   # inactive tab background
bg_normal   = "#cac8e2"   # normal terminal/window background

# --- Text ---
fg    = "#1a1a2e"   # deep navy (primary text)
grey  = "#4c4e6a"   # muted purple-grey (inactive / secondary text)
white = "#2e3050"   # dark indigo (terminal white slot)

# --- Accents (same hues as dark.toml, darkened for mid-tone background) ---
pink   = "#cc0066"   # darkened neon pink
blue   = "#0099cc"   # darkened neon blue
green  = "#007744"   # darkened neon green
yellow = "#997700"   # darkened amber
purple = "#6600bb"   # darkened violet
orange = "#cc4400"   # darkened orange

# --- Brights (ANSI 8–15) ---
black_bright  = "#6b6e8f"
pink_bright   = "#dd0077"
green_bright  = "#008855"
yellow_bright = "#aa8800"
blue_bright   = "#00aadd"
purple_bright = "#7700cc"
orange_bright = "#dd5500"
white_bright  = "#9698b0"

# --- Misc ---
battery_warning = "#cc6600"
shadow          = "#9090a8"   # visible but soft on mid-tone bg
border_inactive = "#a8a8c0"   # medium grey-purple border

# --- Rofi ---
rofi_bg     = "#d8d6f0"
rofi_bg_alt = "#c8c6e4"
rofi_fg_dim = "#7a7a92"
rofi_fg_sec = "#5a5c78"
